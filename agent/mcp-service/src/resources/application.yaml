server:
  port: 19095
  address: 0.0.0.0
  workers: 10

system:
  api_key: "pg-mcp-service"
  version: "1.0.0"
  name: "mcp-service-application"
  is_agentic: true  #多智能体系统
  # 可选：校验 token 是否有效（调用 security 的 /v1/agent/sso/validate）
  # security:
  #   validate_url: "http://localhost:19092/v1/agent/sso/validate"
  nacos:
    enabled: true                 # 是否启用 Nacos 注册
    server_addr: "127.0.0.1:8848" # Nacos 服务器地址
    namespace: "c316bed3-bf5b-4090-aefe-cc13861fa3ed"           # 命名空间 ID（public 为默认命名空间）
    group: "DEFAULT_GROUP"        # 分组
    service_name: "mcp-service-application"  # 在 Nacos 中注册的服务名
    weight: 1.0
    # 使用持久化实例，避免因为未发送心跳被 Nacos 自动摘除
    # （此前配置为 true，启动后几十秒内会自动从 Nacos 列表中消失）
    ephemeral: false              # 是否临时实例（false = 持久化，不需要心跳）
  persistence:
    mysql:
      host: "127.0.0.1"
      port: 3306
      username: "admin"
      #password: "qiji2020.1818"
      password: "123"
      database: "pg-platform-db"
      charset: "utf8mb4"
      sql_file: "sql/pg_agent_application.sql"
    redis:
      host: "127.0.0.1"
      port: 6379
      # 与 redis.conf 中 requirepass 一致。若报错 AUTH called without any password configured，
      # 说明当前运行的 Redis 未加载该配置，请用 redis-server /path/to/redis.conf 启动
      password: ""
      database: 0
    minio:
      endpoint: "127.0.0.1:9000"   # MinIO 服务地址
      access_key: "admin"          # 访问 Key
      secret_key: "admin123"       # 访问 Secret
      secure: false                # 是否使用 HTTPS
      bucket: "pg-agent-rag-files"          # 存储 RAG 文档的桶名称
    qdrant:
      host: "127.0.0.1"
      port: 6333
      api_key: "1"
      database: "pg_agent_application_db"
      collection: "pg_agent_application_collection"
      vector_dim: 512
    elasticsearch:
      host: "127.0.0.1"
      port: 9200
      scheme: "http"
      username: "elastic"
      password: "123123"
      index: "pg-agent-memory"
  # vllm-application 文本向量化服务（用于 RAG 知识嵌入）
  vllm:
    embedding_base_url: "http://127.0.0.1:19094"
    embedding_api_key: "qjzh-vllm"
    file_type: "pdf,txt,office,html"
    llm:
      type: "hsyq"  #火山引擎
      hsyq:
        key: "2c8f48cc-04ea-4cc9-81e0-f53dad148c2a"
        base_url: "https://ark.cn-beijing.volces.com/api/v3"
        model: "doubao-seed-1-8-251228"
  memory:
    short:
      dim: 384
      index: "pg-agent-memory-short"

log:
  # 日志等级配置 (TRACE/DEBUG/INFO/WARN/ERROR/FATAL)
  level: DEBUG
  # 日志格式配置
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # 日志保存路径
  log_dir: "logs"
  # 日志文件名称
  filename: "mcp-service.log"
  # 日志保存时间（天）
  max_days: 30
  # 日志处理器配置
  handlers:
    - type: console  # 控制台输出
    - type: file     # 文件输出





