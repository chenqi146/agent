server:
  port: 19094
  address: 0.0.0.0
  workers: 10

system:
  api_key: "qjzh-vllm"
  version: "1.0.0"
  name: "qjzh-vllm-application"
  tmp:
    image: ../tmp/images

gpu:
  device_count: 4

vllm:
  # ===== GPU 分配方案 (Tesla V100-SXM2-32GB x 4) =====
  # 32B模型4卡并行: 每卡~16GB模型 + ~4GB KV cache = ~20GB
  # 剩余空间: 每卡约 11GB，可运行小模型
  # 启动命令: CUDA_VISIBLE_DEVICES=0,1,2,3 python3 main.py
  
  reranker:
    enable: true
    model: E:/proj/pri-agent/src/pg-platform-agent/models/Qwen/Qwen3-Reranker-0.6B
    device: cpu #cuda:0                  # 与 VLM 共享 GPU 0
    gpu_memory_utilization: 0.05    # 0.6B 约需 1.5GB
    tensor_parallel_size: 1
    max_model_len: 1024
    max_gen_len: 512
    
  embedding:
    enable: true
    model: E:/proj/pri-agent/src/pg-platform-agent/models/Qwen/Qwen3-Embedding-0.6B
    device: cpu #cuda:0                  # 与 VLM 共享 GPU 0
    gpu_memory_utilization: 0.08    # 0.6B 约需 2.5GB
    tensor_parallel_size: 1
    max_model_len: 1024
    max_gen_len: 512
    
  llm:
    enable: false
    model: /mnt/model/Qwen/Qwen3-32B
    device: cuda:0
    gpu_memory_utilization: 0.90
    tensor_parallel_size: 4
    max_model_len: 1024
    max_gen_len: 512
    temperature: 0.6
    top_p: 0.9
    top_k: 40
    engine_type: llm
    
  vlm:
    enable: false
    model: /home/vipuser/work/model/Qwen/Qwen3-VL-32B-Instruct/
    device: auto                    # 4卡并行
    gpu_memory_utilization: 0.75    # 略微增加以支持更长上下文
    tensor_parallel_size: 4         # 64÷4=16 ✓ 使用 4 张卡
    max_model_len: 8192             # 增加以支持图片+文本输入
    max_gen_len: 512
    temperature: 0.6
    top_p: 0.9
    top_k: 40
    engine_type: async

log:
  # 日志等级配置 (TRACE/DEBUG/INFO/WARN/ERROR/FATAL)
  level: DEBUG
  # 日志格式配置
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # 日志保存路径
  log_dir: "../../logs"
  # 日志文件名称
  filename: "qjzh_vllm_application.log"
  # 日志保存时间（天）
  max_days: 30
  # 日志处理器配置
  handlers:
    - type: console  # 控制台输出
    - type: file     # 文件输出 
