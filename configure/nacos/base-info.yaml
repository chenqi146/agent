# MySQL数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pg-platform-db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 30000
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: "1"  # 如果密码是纯数字，建议加引号
      database: 0
      timeout: 10000ms
      connect-timeout: 2000ms
      # 移除 SSL 配置，除非你真的需要
      # ssl:
      #   enabled: false
      lettuce:
        pool:
          max-active: 8
          max-wait: 1000ms  # 修复：使用正值
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms
      # 如果使用 Jedis
      jedis:
        pool:
          max-active: 8
          max-wait: 1000ms
          max-idle: 8
          min-idle: 0